<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Chrome Extension Popup - Scraper</title>
<script src="popup.js" defer></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet"/>
<link href="tailwind.css" rel="stylesheet"/>
<style>
html {
    background-color: transparent;
    
}
body {
    width: 640px;
    min-height: 400px;
    overflow-x: hidden;
    background-color: #0f0f0f; /* Base level 0 */
    color: #e4e2e3;
    margin: 0; padding: 0;
}

.bento-card {
    background-color: #1a1a1a; /* Level 1 */
    border: 1px solid #2a2a2a;
    height: 100%;
}

.bento-card:hover {
    background-color: #1c1c1c;
}

/* Custom Scrollbar for compact spaces */
::-webkit-scrollbar {
    width: 4px;
}
::-webkit-scrollbar-track {
    background: transparent;
}
::-webkit-scrollbar-thumb {
    background: #2a2a2a;
    border-radius: 4px;
}
::-webkit-scrollbar-thumb:hover {
    background: #43474c;
}

/* Switch styling */
.switch-peer:checked ~ .switch-bg {
    background-color: #b6c8de;
}
.switch-peer:checked ~ .switch-bg .switch-dot {
    transform: translateX(100%);
    background-color: #1a1a1a;
}

/* Pill styling */
.pill-chk {
  background-color: transparent; border-color: #2a2a2a; color: #808080;
}
.pill-chk:hover { border-color: #43474c; color: #e4e2e3; }
.pill-chk.on {
  background-color: #252525; border-color: rgba(182, 200, 222, 0.3); color: #b6c8de;
}

#status:empty { display: none; }
#status:not(:empty) { 
  display: block; padding: 8px; border: 1px solid #2a2a2a; 
  border-radius: 4px; background: #1a1a1a; margin-top: 12px; 
  font-family: "JetBrains Mono", monospace; font-size: 11px; color: #8e9196;
  max-height: 120px; overflow-y: auto; white-space: pre-wrap;
}
</style>
</head>
<body class="flex flex-col p-md bg-[#0f0f0f] font-body-sm text-body-sm antialiased rounded-xl overflow-hidden shadow-lg border border-[#2a2a2a]">
<!-- Header -->
<header class="flex justify-between items-center mb-md pb-xs border-b border-[#2a2a2a]">
  <div class="flex items-center gap-sm">
    <img src="icons/icon128.png" alt="TNP Scraper Logo" class="w-5 h-5 object-contain" />
    <h1 class="font-headline-sm text-headline-sm text-on-surface tracking-tight" style="margin:0">TNP Scraper</h1>
  </div>
  <div class="flex items-center gap-xs">
    <span id="versionPill" class="font-data-mono text-data-mono text-outline px-2 py-1 bg-surface-container-high rounded-sm">v?</span>
  </div>
</header>

<!-- Bento Grid Container -->
<main class="grid gap-sm flex-grow overflow-y-auto pr-xs pb-sm grid-cols-12">
  
  <!-- Target Branches Card -->
  <div class="bento-card col-span-12 rounded-lg p-sm flex flex-col gap-sm">
    <div class="flex justify-between items-center">
      <h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest" style="margin:0">Target Branches</h2>
      <div class="flex gap-xs">
        <button id="branchAll" class="font-label-caps text-label-caps text-primary hover:text-primary-fixed transition-colors">Select all</button>
        <span class="text-outline-variant">·</span>
        <button id="branchNone" class="font-label-caps text-label-caps text-outline hover:text-on-surface transition-colors">Clear</button>
      </div>
    </div>
    <div class="flex flex-wrap gap-xs">
      <label id="pill-cse" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchCSE" class="hidden" checked/> CSE</label>
      <label id="pill-it" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchIT" class="hidden" checked/> IT</label>
      <label id="pill-aiml" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchAIML" class="hidden" checked/> AIML</label>
      <label id="pill-mc" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchMC" class="hidden" checked/> M&amp;C</label>
      <label id="pill-ece" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchECE" class="hidden" checked/> ECE</label>
      <label id="pill-eee" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchEEE" class="hidden"/> EEE</label>
      <label id="pill-me" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchME" class="hidden"/> ME</label>
      <label id="pill-ce" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchCE" class="hidden"/> CE</label>
      <label id="pill-chem" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchCHEM" class="hidden"/> CHEM</label>
      <label id="pill-bt" class="pill-chk cursor-pointer px-sm py-1 rounded border font-body-sm transition-colors"><input type="checkbox" id="branchBT" class="hidden"/> BT</label>
    </div>
  </div>

  <!-- CTC Range Card -->
  <div class="bento-card col-span-12 rounded-lg p-sm flex flex-col gap-sm">
    <h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest flex items-center gap-1" style="margin:0">
      CTC Range <span class="text-outline-variant normal-case font-data-mono text-[10px]">(LPA)</span> <span class="text-outline-variant">·</span> <span class="normal-case text-[10px] text-outline">MONTHLY STIPEND ANNUALISED ×12</span>
    </h2>
    <div class="flex items-center gap-sm mt-xs">
      <div class="flex-1 flex flex-col gap-1">
        <label class="font-label-caps text-[10px] text-outline">MIN</label>
        <input id="minCTC" class="w-full bg-[#0f0f0f] border border-[#2a2a2a] rounded px-sm py-1 text-on-surface font-data-mono focus:border-primary focus:ring-0 transition-colors" type="number" step="0.5" placeholder="0"/>
      </div>
      <div class="w-4 h-[1px] bg-[#2a2a2a] mt-4"></div>
      <div class="flex-1 flex flex-col gap-1">
        <label class="font-label-caps text-[10px] text-outline">MAX</label>
        <input id="maxCTC" class="w-full bg-[#0f0f0f] border border-[#2a2a2a] rounded px-sm py-1 text-on-surface font-data-mono focus:border-primary focus:ring-0 transition-colors placeholder:text-outline-variant" type="number" step="0.5" placeholder="any"/>
      </div>
    </div>
  </div>

  <!-- Options Card -->
  <div class="bento-card col-span-7 rounded-lg p-sm flex flex-col gap-md">
    <h2 class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest sr-only" style="margin:0">Options</h2>
    <div class="flex items-start justify-between gap-md group">
      <div class="flex flex-col">
        <span class="font-body-md text-on-surface group-hover:text-white transition-colors">Include final-round selected</span>
        <span class="font-body-sm text-[12px] text-outline mt-0.5">Adds ~1 min per 150 companies</span>
      </div>
      <label class="relative inline-flex items-center cursor-pointer mt-1" id="sw-results">
        <input id="fetchResults" checked="" class="sr-only switch-peer" type="checkbox"/>
        <div class="switch-bg w-8 h-4 bg-[#2a2a2a] rounded-full peer-focus:outline-none transition-colors duration-200">
          <div class="switch-dot absolute top-[2px] left-[2px] bg-outline h-3 w-3 rounded-full transition-transform duration-200"></div>
        </div>
      </label>
    </div>
    
    <div class="h-[1px] w-full bg-[#2a2a2a]"></div>
    
    <div class="flex items-start justify-between gap-md group">
      <div class="flex flex-col">
        <span class="font-body-md text-on-surface flex items-center gap-xs">
          AI enrichment <span class="font-data-mono text-[10px] bg-[#252525] px-1 rounded text-primary">Groq</span>
        </span>
        <span class="font-body-sm text-[12px] text-error mt-0.5 flex items-center gap-1" style="color: #ffb4ab">
          <span class="material-symbols-outlined text-[14px]">key_off</span>
          <span id="aiStatus">no key — open Settings</span>
        </span>
      </div>
      <label class="relative inline-flex items-center cursor-pointer mt-1" id="sw-ai">
        <input id="useAI" class="sr-only switch-peer" type="checkbox"/>
        <div class="switch-bg w-8 h-4 bg-[#2a2a2a] rounded-full transition-colors duration-200">
          <div class="switch-dot absolute top-[2px] left-[2px] bg-outline h-3 w-3 rounded-full transition-transform duration-200"></div>
        </div>
      </label>
    </div>
  </div>

  <!-- Action Card -->
  <div class="col-span-5 grid grid-cols-2 gap-sm">
    <button id="scrapeBtn" class="bento-card rounded-lg p-sm flex flex-col items-center justify-center gap-xs bg-primary text-on-primary hover:bg-primary-fixed transition-colors border-none min-h-[80px] group cursor-pointer" style="background-color: #b6c8de; color: #203243;">
      <span class="material-symbols-outlined text-[24px] group-hover:scale-110 transition-transform">bolt</span>
      <span class="font-label-caps text-label-caps font-bold">Scrape now</span>
    </button>
    <button id="viewerBtn" class="bento-card rounded-lg p-sm flex flex-col items-center justify-center gap-xs hover:border-primary/50 transition-colors min-h-[80px] group text-on-surface cursor-pointer">
      <span class="material-symbols-outlined text-[24px] text-primary group-hover:scale-110 transition-transform">folder_data</span>
      <span class="font-label-caps text-label-caps">Open Viewer <span id="viewerBtnText" class="font-data-mono font-normal text-outline ml-1">(0)</span></span>
    </button>
  </div>

  <div id="status" class="w-full col-span-12"></div>
</main>

<!-- Footer -->
<footer class="mt-auto pt-sm flex gap-sm border-t border-[#2a2a2a]">
  <button id="inspectBtn" class="flex-1 py-2 px-sm flex items-center justify-center gap-xs rounded border border-[#2a2a2a] text-outline hover:text-on-surface hover:border-outline-variant transition-colors bg-[#1a1a1a] cursor-pointer">
    <span class="material-symbols-outlined text-[16px]">code</span>
    <span class="font-label-caps text-[10px]">Inspect DOM</span>
  </button>
  <button id="settingsBtn" class="flex-1 py-2 px-sm flex items-center justify-center gap-xs rounded border border-[#2a2a2a] text-outline hover:text-on-surface hover:border-outline-variant transition-colors bg-[#1a1a1a] cursor-pointer">
    <span class="material-symbols-outlined text-[16px]">settings</span>
    <span class="font-label-caps text-[10px]">Settings</span>
  </button>
</footer>

<script src="popup.js"></script>
</body>
</html>
