<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body { width: 320px; font-family: -apple-system, sans-serif; padding: 12px; margin: 0; }
    h1 { font-size: 14px; margin: 0 0 8px; }
    .row { margin: 8px 0; display: flex; align-items: center; gap: 6px; font-size: 12px; }
    button { width: 100%; padding: 10px; background: #1a73e8; color: white; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    button.secondary { background: #5f6368; margin-top: 6px; }
    #status { margin-top: 10px; padding: 8px; background: #f5f5f5; border-radius: 4px; font-size: 11px; max-height: 140px; overflow-y: auto; white-space: pre-wrap; font-family: ui-monospace, monospace; }
    label { font-size: 12px; }
    input[type="text"] { width: 100%; box-sizing: border-box; padding: 6px; font-size: 12px; border: 1px solid #ccc; border-radius: 4px; }
    .hint { color: #666; font-size: 10px; margin-top: 2px; }
  </style>
</head>
<body>
  <h1>BIT TNP Scraper</h1>

  <div class="row">
    <label style="flex:1;">
      Academic year filter
      <input type="text" id="yearFilter" value="25-26" />
      <div class="hint">Matches "25-26", "2025-26", "2025-2026"</div>
    </label>
  </div>

  <div class="row">
    <label><input type="checkbox" id="branchCSE" checked /> CSE</label>
    <label><input type="checkbox" id="branchAIML" checked /> AIML</label>
    <label><input type="checkbox" id="branchECE" checked /> ECE</label>
  </div>

  <button id="scrapeBtn">Scrape current page</button>
  <button id="inspectBtn" class="secondary">Inspect DOM (debug)</button>

  <div id="status">Open the TNP portal page that lists companies for 25-26, then click "Scrape current page".</div>

  <script src="popup.js"></script>
</body>
</html>
